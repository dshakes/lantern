# NEGATIVE probe — applied separately by validate.sh; NOT part of the normal
# manifest set. A hostile workload requesting root + privilege escalation +
# privileged mode. With the namespace's `pod-security.kubernetes.io/enforce:
# restricted` label, the API server must REJECT this pod at admission.
apiVersion: v1
kind: Pod
metadata:
  name: escalation-probe
  namespace: lantern-t-validate
  labels:
    lantern.dev/run-id: run-validate-escalation
spec:
  restartPolicy: Never
  containers:
    - name: escalation
      image: busybox:1.36
      command: ["sleep", "60"]
      securityContext:
        runAsUser: 0
        allowPrivilegeEscalation: true
        privileged: true
