# NEGATIVE probe (fail-closed) — applied separately by validate.sh; NOT part of
# the normal manifest set. This is the core ADR-0009 invariant under test:
#
#   An UNTRUSTED / HOSTILE workload is scheduled with a `runtimeClassName` that
#   selects a sandbox handler (gVisor / Kata). If that handler is NOT installed
#   on the node's CRI, the pod MUST stay unschedulable / be refused — it must
#   NEVER silently fall back to the default `runc` runtime. "No sandbox → does
#   not run" is fail-CLOSED; "no sandbox → runs on runc anyway" is the exact
#   confused-deputy escape ADR-0009 forbids (untrusted code on a shared kernel).
#
# On a vanilla kind cluster `gvisor` is NOT registered, so this pod must be
# rejected at admission (the RuntimeClass object is absent) OR — if the
# RuntimeClass object exists but its handler is missing — stay Pending and never
# reach Running. validate.sh asserts it never runs. This is testable in CI
# WITHOUT actually installing gVisor: we only assert the refusal, not execution.
apiVersion: v1
kind: Pod
metadata:
  name: untrusted-missing-runtimeclass
  namespace: lantern-t-validate
  labels:
    app.kubernetes.io/managed-by: lantern-runtime-manager
    lantern.dev/run-id: run-validate-untrusted
    lantern.dev/isolation-class: untrusted
spec:
  # gVisor is the ADR-0009 RuntimeClass for STANDARD/UNTRUSTED. It is NOT
  # installed on a stock kind node, so this reference must NOT resolve to runc.
  runtimeClassName: gvisor
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: untrusted
      image: busybox:1.36
      command: ["sleep", "60"]
      securityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        privileged: false
        capabilities:
          drop: ["ALL"]
