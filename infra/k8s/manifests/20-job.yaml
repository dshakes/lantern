# Sample workload Job — mirrors EXACTLY what build_job() in
# services/runtime-manager/src/backends/k8s.rs produces today, except:
#   - image is busybox + `sleep` (instead of the agent-runner image) so
#     validate.sh can `kubectl exec` real network/filesystem probes;
#     k8s.rs would set the agent image and LANTERN_BUNDLE_URI/LANTERN_INPUT.
# Everything security-relevant below is verified to match k8s.rs:
#   pod:       runAsNonRoot, seccompProfile RuntimeDefault,
#              automountServiceAccountToken false, restartPolicy Never,
#              serviceAccountName lantern-agent-runner, backoffLimit 0
#   container: capabilities.drop [ALL], allowPrivilegeEscalation false,
#              privileged false, runAsNonRoot, runAsUser 1000,
#              readOnlyRootFilesystem true
apiVersion: batch/v1
kind: Job
metadata:
  name: lantern-run-validate-00000001
  namespace: lantern-t-validate
  labels:
    app.kubernetes.io/name: lantern-agent-runner
    app.kubernetes.io/managed-by: lantern-runtime-manager
    lantern.dev/run-id: run-validate-00000001
    lantern.dev/isolation-class: untrusted
spec:
  backoffLimit: 0 # no retries; the workflow engine owns retry semantics
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lantern-agent-runner
        app.kubernetes.io/managed-by: lantern-runtime-manager
        lantern.dev/run-id: run-validate-00000001
        lantern.dev/isolation-class: untrusted
    spec:
      restartPolicy: Never
      serviceAccountName: lantern-agent-runner
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent-runner
          image: busybox:1.36
          command: ["sleep", "1800"]
          env:
            - name: LANTERN_RUN_ID
              value: run-validate-00000001
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop: ["ALL"]
