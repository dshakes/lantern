x-common-env: &common-env
  DATABASE_URL: postgres://lantern:lantern@postgres:5432/lantern?sslmode=disable
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: lantern-dev
  AWS_ACCESS_KEY_ID: lantern
  AWS_SECRET_ACCESS_KEY: lanternsecret
  LOG_LEVEL: debug

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lantern
      POSTGRES_USER: lantern
      POSTGRES_PASSWORD: lantern
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lantern -d lantern"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lantern
      MINIO_ROOT_PASSWORD: lanternsecret
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 lantern lanternsecret &&
        mc mb local/lantern-dev --ignore-existing &&
        mc mb local/lantern-bundles --ignore-existing &&
        mc mb local/lantern-snapshots --ignore-existing &&
        echo 'Buckets created'
      "

  control-plane:
    build:
      context: ../..
      dockerfile: services/control-plane/Dockerfile
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      <<: *common-env
      LISTEN_ADDR: ":50051"
      JWT_SECRET: lantern-dev-jwt-secret-do-not-use-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  workflow-engine:
    build:
      # Root context so the build can include the gen/go module that
      # workflow-engine depends on via `replace ../../gen/go`.
      context: ../..
      dockerfile: services/workflow-engine/Dockerfile
    ports:
      - "50052:50052"
    environment:
      <<: *common-env
      LISTEN_ADDR: ":50052"
      CONTROL_PLANE_ADDR: control-plane:50051
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      <<: *common-env
      LISTEN_ADDR: "0.0.0.0:8443"
      CONTROL_PLANE_ADDR: control-plane:50051
      MODEL_ROUTER_ADDR: model-router:50053
      WORKFLOW_ENGINE_ADDR: workflow-engine:50052
      JWT_SECRET: lantern-dev-jwt-secret-do-not-use-in-production
    depends_on:
      control-plane:
        condition: service_healthy
      model-router:
        condition: service_started

  model-router:
    build:
      context: ../../services/model-router
      dockerfile: Dockerfile
    ports:
      - "50053:50053"
    environment:
      <<: *common-env
      LISTEN_ADDR: "0.0.0.0:50053"
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      LANTERN_API_URL: http://control-plane:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      control-plane:
        condition: service_healthy

  landing:
    build:
      context: ../../apps/landing
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  # ---------- Runtime profile --------------------------------------------------
  # These services are NOT started by plain `make dev` / `docker compose up`.
  # To start them alongside the rest of the stack:
  #   docker compose -f infra/docker/docker-compose.yml --profile runtime up --build
  #
  # To also route the control-plane at them, add this env to the control-plane
  # service definition (or override via .env.local):
  #   LANTERN_SCHEDULER_GRPC_ADDR: runtime-scheduler:50055
  # (Not wired here by default so plain `make dev` keeps the stub-scheduler
  # path — dashboard-only work should not require the Rust runtime-manager.)

  runtime-scheduler:
    profiles: ["runtime"]
    build:
      # Root context so the Dockerfile can COPY gen/go (replace directive).
      context: ../..
      dockerfile: services/runtime-scheduler/Dockerfile
    ports:
      - "50055:50055"
      - "8085:8085"
    environment:
      LANTERN_DEFAULT_MANAGER_ADDR: runtime-manager:50054
      JWT_SECRET: lantern-dev-jwt-secret-do-not-use-in-production
      LOG_LEVEL: debug
    depends_on:
      runtime-manager:
        condition: service_started

  runtime-manager:
    profiles: ["runtime"]
    build:
      context: ../../services/runtime-manager
      dockerfile: Dockerfile
    ports:
      - "50054:50054"
    environment:
      LISTEN_ADDR: "0.0.0.0:50054"
      RUNTIME_BACKEND: docker
      LOG_LEVEL: debug
      # Tell the manager to self-register heartbeats with the scheduler.
      SCHEDULER_URL: http://runtime-scheduler:8085
    volumes:
      # Docker socket mount so the docker backend can spawn agent containers.
      # SECURITY: grants container-escape-equivalent root on the host —
      # acceptable for dev-only use; replace with a dedicated Docker daemon
      # socket or rootless Docker in production.
      - /var/run/docker.sock:/var/run/docker.sock

  # NOTE: the WhatsApp + iMessage bridges are macOS-host services (they need
  # macOS TCC, AppleScript, Contacts/Calendar, and the local chat.db) and do
  # not run in a Linux container. Run them on the host instead:
  #   lantern dev        (boots them under tsx with hot reload), or
  #   make run-whatsapp-bridge / make run-imessage-bridge

volumes:
  pg-data:
  minio-data:
