apiVersion: v2
name: lantern-data-plane
description: >-
  Lantern Data Plane — Workflow engine, runtime manager, and data plane agent.
  Deploy this chart into the customer's own Kubernetes cluster (EKS, GKE, AKS,
  or bare metal). The data plane agent connects outbound to the Lantern control
  plane via a gRPC tunnel. Agent code and data never leave the customer's VPC.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - ai-agents
  - serverless
  - workflow
  - llm
  - data-plane
home: https://lantern.run
sources:
  - https://github.com/dshakes/lantern
maintainers:
  - name: dshakes

# ---------------------------------------------------------------------------
# Subchart dependencies
#
# The in-cluster Postgres / Redis / MinIO are provided by the Bitnami charts.
# Versions are pinned exactly; run `helm dependency build` (uses Chart.lock) to
# vendor the matching .tgz into charts/ before `helm install`/`helm template`.
#
# Each dependency is gated by its `<name>.enabled` value so an operator can skip
# the in-cluster instance and point the data plane at external infra in the
# customer's VPC:
#   - postgresql.enabled=false  -> postgresql.external (RDS / Cloud SQL)
#   - redis.enabled=false       -> redis.external (ElastiCache / Memorystore)
#   - minio.enabled=false       -> minio.external (S3 / GCS / Azure Blob)
# ---------------------------------------------------------------------------
dependencies:
  - name: postgresql
    version: 18.7.6
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 27.0.10
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: 17.0.21
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
