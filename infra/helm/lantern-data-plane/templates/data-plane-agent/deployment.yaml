apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lantern-dp.fullname" . }}-data-plane-agent
  labels:
    {{- include "lantern-dp.componentLabels" (dict "root" . "component" "data-plane-agent") | nindent 4 }}
spec:
  # The data plane agent should run as a single replica to avoid duplicate
  # tunnel connections. The control plane deduplicates, but a single replica
  # keeps things simple.
  replicas: {{ .Values.dataPlaneAgent.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "lantern-dp.componentSelectorLabels" (dict "root" . "component" "data-plane-agent") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lantern-dp.componentLabels" (dict "root" . "component" "data-plane-agent") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lantern-dp.serviceAccountName" . }}
      containers:
        - name: data-plane-agent
          image: {{ include "lantern-dp.image" (dict "root" . "component" .Values.dataPlaneAgent) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: CONTROL_PLANE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern-dp.fullname" . }}-config
                  key: CONTROL_PLANE_ENDPOINT
            - name: TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern-dp.fullname" . }}-config
                  key: TENANT_ID
            - name: AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lantern-dp.fullname" . }}-secrets
                  key: agent-token
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern-dp.fullname" . }}-config
                  key: LOG_LEVEL
            - name: WORKFLOW_ENGINE_ADDR
              value: "{{ include "lantern-dp.fullname" . }}-workflow-engine:{{ .Values.workflowEngine.service.port }}"
            - name: RUNTIME_MANAGER_ADDR
              value: "{{ include "lantern-dp.fullname" . }}-runtime-manager:{{ .Values.runtimeManager.service.port }}"
            - name: HEARTBEAT_INTERVAL_SECONDS
              value: {{ .Values.dataPlaneAgent.heartbeatIntervalSeconds | quote }}
            - name: RECONNECT_INITIAL_DELAY_MS
              value: {{ .Values.dataPlaneAgent.reconnect.initialDelayMs | quote }}
            - name: RECONNECT_MAX_DELAY_MS
              value: {{ .Values.dataPlaneAgent.reconnect.maxDelayMs | quote }}
            - name: RECONNECT_JITTER_PERCENT
              value: {{ .Values.dataPlaneAgent.reconnect.jitterPercent | quote }}
            - name: TLS_INSECURE_SKIP_VERIFY
              value: {{ .Values.controlPlane.tlsInsecureSkipVerify | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dataPlaneAgent.resources | nindent 12 }}
