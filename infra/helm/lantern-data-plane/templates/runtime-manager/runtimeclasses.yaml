{{- /*
RuntimeClass objects for the isolation tiers (ADR 0009).

Rendered only when runtimeManager.createRuntimeClasses=true. Each RuntimeClass
maps to a node-level containerd/CRI handler that MUST already be installed on the
nodes (gVisor/runsc, Kata Containers). A RuntimeClass that references a missing
handler makes pods that request it unschedulable — fail-safe (the workload does
not run), but operationally visible. Manage these out of band if your platform
(e.g. GKE Sandbox) provisions them for you, and leave createRuntimeClasses=false.

The handler name is assumed equal to the RuntimeClass name. Override by editing
this template if your CRI registers the handler under a different key.
*/ -}}
{{- if .Values.runtimeManager.createRuntimeClasses }}
{{- with .Values.runtimeManager.runtimeClasses }}
{{- if .gvisor }}
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .gvisor | quote }}
  labels:
    {{- include "lantern-dp.labels" $ | nindent 4 }}
    lantern.dev/isolation-tier: untrusted
handler: {{ .gvisor | quote }}
{{- end }}
{{- if .kata }}
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .kata | quote }}
  labels:
    {{- include "lantern-dp.labels" $ | nindent 4 }}
    lantern.dev/isolation-tier: hostile
handler: {{ .kata | quote }}
{{- end }}
{{- if .wasm }}
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .wasm | quote }}
  labels:
    {{- include "lantern-dp.labels" $ | nindent 4 }}
    lantern.dev/isolation-tier: wasm
handler: {{ .wasm | quote }}
{{- end }}
{{- end }}
{{- end }}
