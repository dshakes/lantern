{{- /*
External Secrets Operator (ESO) artifacts (gated externalSecrets.enabled,
default false).

SCOPE — read this before using: Lantern's PRIMARY secret path for AGENT runtime
secrets is the in-VM mTLS vend — the harness fetches short-TTL secrets at
execution time and refs (lantern.secret/...) NEVER land in pod env. ESO is NOT
that path. ESO is for OPERATOR-MANAGED PLATFORM secrets (e.g. the postgres
password, the agentToken, registry pull creds) so they can live in Vault / AWS
Secrets Manager / GCP Secret Manager instead of helm values.

This renders a (Cluster)SecretStore for the configured provider (default Vault)
and one EXAMPLE ExternalSecret that materializes a platform secret. Treat the
ExternalSecret as a template — point target.name at the secret your services
consume.

REQUIRES: External Secrets Operator installed (external-secrets.io CRDs) and the
provider backend reachable + authorized. `helm template` renders these; apply
needs the ESO CRDs present.
*/ -}}
{{- if .Values.externalSecrets.enabled }}
{{- $provider := .Values.externalSecrets.provider | default "vault" }}
{{- $kind := .Values.externalSecrets.clusterScope | default false | ternary "ClusterSecretStore" "SecretStore" }}
apiVersion: external-secrets.io/v1beta1
kind: {{ $kind }}
metadata:
  name: {{ include "lantern-dp.fullname" . }}-store
  labels:
    {{- include "lantern-dp.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq $provider "vault" }}
    vault:
      server: {{ .Values.externalSecrets.vault.server | quote }}
      path: {{ .Values.externalSecrets.vault.path | quote }}
      version: {{ .Values.externalSecrets.vault.version | default "v2" | quote }}
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.vault.authMountPath | default "kubernetes" | quote }}
          role: {{ .Values.externalSecrets.vault.role | quote }}
          serviceAccountRef:
            name: {{ include "lantern-dp.serviceAccountName" . }}
    {{- else if eq $provider "aws" }}
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "lantern-dp.serviceAccountName" . }}
    {{- else if eq $provider "gcp" }}
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcp.projectID | quote }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.gcp.clusterLocation | quote }}
          clusterName: {{ .Values.externalSecrets.gcp.clusterName | quote }}
          serviceAccountRef:
            name: {{ include "lantern-dp.serviceAccountName" . }}
    {{- end }}
---
# Example ExternalSecret — materializes a platform secret from the store above
# into a native Kubernetes Secret. Adapt remoteRef.key to your backend layout.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lantern-dp.fullname" . }}-platform-secrets
  labels:
    {{- include "lantern-dp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ include "lantern-dp.fullname" . }}-store
    kind: {{ $kind }}
  target:
    name: {{ .Values.externalSecrets.example.targetSecretName | default (printf "%s-platform" (include "lantern-dp.fullname" .)) | quote }}
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: {{ .Values.externalSecrets.example.postgresPasswordRef | default "lantern/data-plane" | quote }}
        property: {{ .Values.externalSecrets.example.postgresPasswordProperty | default "postgres-password" | quote }}
{{- end }}
