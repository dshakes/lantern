# lantern-control-plane values
#
# This chart deploys only the control plane components. For the data plane
# (workflow engine, runtime manager, data plane agent), see lantern-data-plane.
# For an all-in-one local dev deployment, see the lantern chart.

global:
  image:
    registry: ghcr.io
    repository: dshakes/lantern
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  logLevel: info
  # Bitnami subcharts (postgresql/redis/minio, v1.5.x+ image-verification guard)
  # refuse to render when their image is overridden to a non-Bitnami container.
  # Lantern intentionally runs `pgvector/pgvector` for the Postgres subchart (the
  # pgvector extension is a hard requirement), so the guard must be relaxed for
  # the in-cluster dev/self-host path. Has no effect on managed-infra deployments
  # (postgresql.enabled=false etc.).
  security:
    allowInsecureImages: true

# ---------------------------------------------------------------------------
# Gateway (Rust, Axum) — TLS termination, auth, rate limiting, streaming proxy
# ---------------------------------------------------------------------------
gateway:
  replicas: 2
  image:
    name: gateway
  service:
    type: ClusterIP
    port: 8443
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    LISTEN_ADDR: "0.0.0.0:8443"

# ---------------------------------------------------------------------------
# Control Plane Service (Go) — agents, runs, tenants, RBAC, API keys
# ---------------------------------------------------------------------------
controlPlane:
  replicas: 2
  image:
    name: control-plane
  service:
    type: ClusterIP
    grpcPort: 50051
    httpPort: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env:
    LISTEN_ADDR: ":50051"

# ---------------------------------------------------------------------------
# Model Router (Rust) — capability addressing, LLM routing, caching
# ---------------------------------------------------------------------------
modelRouter:
  replicas: 2
  image:
    name: model-router
  service:
    type: ClusterIP
    port: 50053
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ---------------------------------------------------------------------------
# Surface Gateway (Rust) — external surface adapters (Slack, Teams, etc.)
# ---------------------------------------------------------------------------
surfaceGateway:
  replicas: 1
  image:
    name: surface-gateway
  service:
    type: ClusterIP
    port: 8444
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Dashboard (Next.js 15) — web UI
# ---------------------------------------------------------------------------
dashboard:
  replicas: 1
  image:
    name: web
  service:
    type: ClusterIP
    port: 3000

# ---------------------------------------------------------------------------
# Billing Service (Go) — usage metering, invoices, budget enforcement
# ---------------------------------------------------------------------------
billing:
  replicas: 1
  image:
    name: billing
  service:
    type: ClusterIP
    grpcPort: 50060
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Scheduler (Go) — cron triggers, delayed jobs, fair-share scheduling
# ---------------------------------------------------------------------------
scheduler:
  replicas: 1
  image:
    name: scheduler
  service:
    type: ClusterIP
    grpcPort: 50061
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Infrastructure dependencies
# ---------------------------------------------------------------------------
# Postgres.
#
# PRODUCTION GUIDANCE: the in-cluster Bitnami Postgres below (postgresql.enabled=true)
# is for dev / self-host evaluation only — a single pod on a PVC with NO automated
# backups or point-in-time recovery. For a real GA deployment, set
# `postgresql.enabled=false` and point Lantern at a MANAGED Postgres (RDS / Cloud SQL /
# Azure Database) via `externalDatabase` below — managed Postgres gives you automated
# snapshots + WAL archiving + PITR + failover out of the box. If you must run in-cluster,
# enable the `backup` CronJob below (logical pg_dump → S3) and read
# docs/runbooks/db-restore.md.
postgresql:
  enabled: true
  auth:
    username: lantern
    password: ""  # set via secret
    database: lantern
  primary:
    persistence:
      size: 10Gi
  image:
    repository: pgvector/pgvector
    tag: pg16

# externalDatabase — point the control-plane at a MANAGED Postgres (the GA path).
# When enabled, set postgresql.enabled=false. The pgvector extension must be available
# (RDS/Cloud SQL both support it). Backups/PITR are then the managed provider's job.
externalDatabase:
  enabled: false
  host: ""              # e.g. lantern-prod.xxxx.us-west-2.rds.amazonaws.com
  port: 5432
  database: lantern
  user: lantern
  sslmode: require
  existingSecret: "lantern-db"
  existingSecretPasswordKey: "postgres-password"
  # The non-superuser role Lantern connects as when RLS enforcement is on
  # (LANTERN_RLS_ENFORCE=1). Provision it on the managed instance.
  appUser: "lantern_app"
  appExistingSecretPasswordKey: "lantern-app-password"

# backup — opt-in logical backup CronJob for the IN-CLUSTER Postgres. pg_dump'd on a
# schedule and uploaded to S3 (or the in-cluster MinIO). NOT a substitute for
# managed-Postgres PITR (a logical dump loses data between runs); it's a floor so a
# self-host install isn't backup-less. Disabled by default. Restore: docs/runbooks/db-restore.md.
backup:
  enabled: false
  schedule: "0 2 * * *"           # 02:00 daily (cluster TZ)
  image: "pgvector/pgvector:pg16" # has pg_dump + matching server version
  s3Bucket: "lantern-backups"
  s3Endpoint: ""                  # empty = AWS S3; set to the MinIO endpoint for in-cluster
  s3Region: "us-east-1"
  retentionDays: 14               # prune dumps older than this
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

minio:
  enabled: true
  auth:
    rootUser: lantern
    rootPassword: ""  # set via secret
  defaultBuckets: "lantern-bundles,lantern-snapshots"
  persistence:
    size: 10Gi

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: api.lantern.run
      paths:
        - path: /
          pathType: Prefix
          service: gateway
    - host: app.lantern.run
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
  tls: []

# ---------------------------------------------------------------------------
# Secrets — override via --set or external secrets operator
# ---------------------------------------------------------------------------
secrets:
  jwtSecret: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  postgresPassword: "lantern"
  minioPassword: "lanternsecret"

# ---------------------------------------------------------------------------
# Data plane tunnel listener
# ---------------------------------------------------------------------------
dataPlaneListener:
  # The control plane listens for inbound data plane agent connections on this port.
  port: 50070
  # Maximum number of data plane connections per tenant.
  maxConnectionsPerTenant: 10

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: "lantern-control-plane"
  annotations: {}
