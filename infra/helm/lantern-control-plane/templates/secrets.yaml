apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lantern-cp.fullname" . }}-secrets
  labels:
    {{- include "lantern-cp.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  minio-password: {{ .Values.secrets.minioPassword | b64enc | quote }}
