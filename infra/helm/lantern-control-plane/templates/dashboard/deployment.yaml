apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lantern-cp.fullname" . }}-dashboard
  labels:
    {{- include "lantern-cp.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "lantern-cp.componentSelectorLabels" (dict "root" . "component" "dashboard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lantern-cp.componentLabels" (dict "root" . "component" "dashboard") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lantern-cp.serviceAccountName" . }}
      containers:
        - name: dashboard
          image: {{ include "lantern-cp.image" (dict "root" . "component" .Values.dashboard) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: LANTERN_API_URL
              value: "http://{{ include "lantern-cp.fullname" . }}-gateway:{{ .Values.gateway.service.port }}"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
