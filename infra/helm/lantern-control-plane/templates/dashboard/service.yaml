apiVersion: v1
kind: Service
metadata:
  name: {{ include "lantern-cp.fullname" . }}-dashboard
  labels:
    {{- include "lantern-cp.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "lantern-cp.componentSelectorLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
