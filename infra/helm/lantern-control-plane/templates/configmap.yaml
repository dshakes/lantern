apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lantern-cp.fullname" . }}-config
  labels:
    {{- include "lantern-cp.labels" . | nindent 4 }}
data:
  DATABASE_URL: "postgres://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "lantern-cp.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
  REDIS_URL: "redis://{{ include "lantern-cp.fullname" . }}-redis-master:6379"
  S3_ENDPOINT: "http://{{ include "lantern-cp.fullname" . }}-minio:9000"
  S3_BUCKET: "lantern-bundles"
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.minio.auth.rootUser | quote }}
