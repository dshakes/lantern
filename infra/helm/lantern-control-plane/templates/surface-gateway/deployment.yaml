apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lantern-cp.fullname" . }}-surface-gateway
  labels:
    {{- include "lantern-cp.componentLabels" (dict "root" . "component" "surface-gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.surfaceGateway.replicas }}
  selector:
    matchLabels:
      {{- include "lantern-cp.componentSelectorLabels" (dict "root" . "component" "surface-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lantern-cp.componentLabels" (dict "root" . "component" "surface-gateway") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lantern-cp.serviceAccountName" . }}
      containers:
        - name: surface-gateway
          image: {{ include "lantern-cp.image" (dict "root" . "component" .Values.surfaceGateway) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8444
              protocol: TCP
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern-cp.fullname" . }}-config
                  key: LOG_LEVEL
            - name: CONTROL_PLANE_ADDR
              value: "{{ include "lantern-cp.fullname" . }}-control-plane:{{ .Values.controlPlane.service.grpcPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.surfaceGateway.resources | nindent 12 }}
