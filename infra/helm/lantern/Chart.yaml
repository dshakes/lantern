apiVersion: v2
name: lantern
description: >-
  Lantern — Serverless platform for production AI agents.
  This is the all-in-one chart that deploys every component into a single
  cluster. Use it for local development, CI, and simple self-hosted
  deployments.

  For production split deployments, use the dedicated charts:
    - lantern-control-plane (infra/helm/lantern-control-plane/)
    - lantern-data-plane    (infra/helm/lantern-data-plane/)

  See docs/architecture/17-deployment-model.md for the full deployment
  architecture.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - ai-agents
  - serverless
  - workflow
  - llm
home: https://lantern.run
sources:
  - https://github.com/dshakes/lantern
maintainers:
  - name: dshakes

# ---------------------------------------------------------------------------
# Subchart dependencies
#
# The in-cluster Postgres / Redis / MinIO are provided by the Bitnami charts.
# Versions are pinned exactly; run `helm dependency build` (uses Chart.lock) to
# vendor the matching .tgz into charts/ before `helm install`/`helm template`.
#
# Each dependency is gated by its `<name>.enabled` value so an operator can skip
# the in-cluster instance and point Lantern at managed infra (Postgres / Redis /
# object storage). For this all-in-one chart they default to enabled.
# ---------------------------------------------------------------------------
dependencies:
  - name: postgresql
    version: 18.7.6
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 27.0.10
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: 17.0.21
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
