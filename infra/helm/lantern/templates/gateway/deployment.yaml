apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lantern.fullname" . }}-gateway
  labels:
    {{- include "lantern.componentLabels" (dict "root" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "lantern.componentSelectorLabels" (dict "root" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lantern.componentLabels" (dict "root" . "component" "gateway") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lantern.serviceAccountName" . }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "lantern.componentSelectorLabels" (dict "root" . "component" "gateway") | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: gateway
          image: {{ include "lantern.image" (dict "root" . "component" .Values.gateway) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: {{ .Values.gateway.env.LISTEN_ADDR | quote }}
            - name: CONTROL_PLANE_ADDR
              value: "{{ include "lantern.fullname" . }}-control-plane:{{ .Values.controlPlane.service.grpcPort }}"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern.fullname" . }}-config
                  key: LOG_LEVEL
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lantern.fullname" . }}-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "lantern.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern.fullname" . }}-config
                  key: REDIS_URL
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern.fullname" . }}-config
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern.fullname" . }}-config
                  key: S3_BUCKET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lantern.fullname" . }}-config
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lantern.fullname" . }}-secrets
                  key: minio-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lantern.fullname" . }}-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
