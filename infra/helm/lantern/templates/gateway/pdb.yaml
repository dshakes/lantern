{{- if (gt (int .Values.gateway.replicas) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lantern.fullname" . }}-gateway
  labels:
    {{- include "lantern.componentLabels" (dict "root" . "component" "gateway") | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "lantern.componentSelectorLabels" (dict "root" . "component" "gateway") | nindent 6 }}
{{- end }}
