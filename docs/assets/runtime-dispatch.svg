<svg xmlns="http://www.w3.org/2000/svg" width="940" height="400" viewBox="0 0 940 400"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="Runtime isolation dispatch — four isolation classes route to their required RuntimeClass, with a fail-closed gate when the runtime is unavailable">
  <title>Runtime dispatch — isolation class to RuntimeClass, fail-closed</title>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect width="940" height="400" rx="16" fill="#0b1120"/>
  <rect width="940" height="400" rx="16" fill="none" stroke="#1e293b"/>

  <!-- title -->
  <text x="32" y="38" fill="#f8fafc" font-size="20" font-weight="700">Runtime dispatch — isolation class → RuntimeClass</text>
  <text x="32" y="56" fill="#94a3b8" font-size="11">UNTRUSTED and HOSTILE hard-fail if the required class is absent — never downgrade to runc</text>

  <!-- ── column headers ── -->
  <text x="72" y="82" fill="#cbd5e1" font-size="10.5" font-weight="700" letter-spacing=".12em" text-anchor="middle">ISOLATION CLASS</text>
  <text x="355" y="82" fill="#cbd5e1" font-size="10.5" font-weight="700" letter-spacing=".12em" text-anchor="middle">RUNTIME</text>

  <!-- ── TRUSTED ── -->
  <rect x="32" y="92" width="160" height="52" rx="8" fill="#141d30" stroke="#64748b"/>
  <text x="112" y="116" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">TRUSTED</text>
  <text x="112" y="133" fill="#94a3b8" font-size="9.5" text-anchor="middle">signed first-party only</text>

  <rect x="268" y="92" width="175" height="52" rx="8" fill="#1a1d28" stroke="#475569"/>
  <text x="355" y="116" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">runc</text>
  <text x="355" y="133" fill="#94a3b8" font-size="9.5" text-anchor="middle">shared kernel · shared nodes</text>

  <line x1="192" y1="118" x2="268" y2="118" stroke="#64748b" marker-end="url(#a)"/>

  <!-- ── STANDARD ── -->
  <rect x="32" y="164" width="160" height="52" rx="8" fill="#141d30" stroke="#34d399" stroke-opacity="0.6"/>
  <text x="112" y="188" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">STANDARD</text>
  <text x="112" y="205" fill="#94a3b8" font-size="9.5" text-anchor="middle">default · most agent code</text>

  <rect x="268" y="164" width="175" height="52" rx="8" fill="#0a1a12" stroke="#34d399"/>
  <text x="355" y="188" fill="#6ee7b7" font-size="12" font-weight="700" text-anchor="middle">gVisor</text>
  <text x="355" y="205" fill="#94a3b8" font-size="9.5" text-anchor="middle">user-space kernel (runsc)</text>

  <line x1="192" y1="190" x2="268" y2="190" stroke="#34d399" stroke-opacity="0.7" marker-end="url(#ag)"/>

  <!-- ── UNTRUSTED ── -->
  <rect x="32" y="236" width="160" height="52" rx="8" fill="#141d30" stroke="#f59e0b" stroke-opacity="0.7"/>
  <text x="112" y="260" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">UNTRUSTED</text>
  <text x="112" y="277" fill="#94a3b8" font-size="9.5" text-anchor="middle">internet pkgs · browser</text>

  <rect x="268" y="236" width="175" height="52" rx="8" fill="#0a1a12" stroke="#34d399"/>
  <text x="355" y="256" fill="#6ee7b7" font-size="12" font-weight="700" text-anchor="middle">gVisor</text>
  <text x="355" y="272" fill="#94a3b8" font-size="9.5" text-anchor="middle">+ egress-deny · hardened</text>

  <line x1="192" y1="262" x2="268" y2="262" stroke="#34d399" stroke-opacity="0.7" marker-end="url(#ag)"/>

  <!-- ── HOSTILE ── -->
  <rect x="32" y="308" width="160" height="52" rx="8" fill="#141d30" stroke="#ef4444" stroke-opacity="0.7"/>
  <text x="112" y="332" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">HOSTILE</text>
  <text x="112" y="349" fill="#94a3b8" font-size="9.5" text-anchor="middle">adversarial · untrusted exec</text>

  <rect x="268" y="308" width="175" height="52" rx="8" fill="#1a0908" stroke="#ef4444"/>
  <text x="355" y="328" fill="#fca5a5" font-size="12" font-weight="700" text-anchor="middle">Kata microVM</text>
  <text x="355" y="345" fill="#94a3b8" font-size="9.5" text-anchor="middle">hardware VM · dedicated pool</text>

  <line x1="192" y1="334" x2="268" y2="334" stroke="#ef4444" stroke-opacity="0.7" marker-end="url(#ar)"/>

  <!-- ── refuse · fail closed node ── -->
  <rect x="530" y="254" width="200" height="68" rx="8" fill="#1a0808" stroke="#ef4444"/>
  <text x="630" y="278" fill="#fca5a5" font-size="12" font-weight="700" text-anchor="middle">refuse · fail closed</text>
  <text x="630" y="296" fill="#94a3b8" font-size="10" text-anchor="middle">BackendChoice::Unavailable</text>
  <text x="630" y="312" fill="#94a3b8" font-size="9.5" text-anchor="middle">never downgrade to runc</text>

  <!-- UNTRUSTED dashed → refuse (no gVisor configured) -->
  <polyline points="443,262 510,262 510,276 530,276" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5,4" stroke-opacity="0.75" marker-end="url(#ar)"/>
  <text x="476" y="253" fill="#ef4444" font-size="9.5" text-anchor="middle" font-style="italic">no gVisor configured</text>

  <!-- HOSTILE dashed → refuse (no Kata configured) -->
  <polyline points="443,334 510,334 510,302 530,302" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5,4" stroke-opacity="0.75" marker-end="url(#ar)"/>
  <text x="476" y="350" fill="#ef4444" font-size="9.5" text-anchor="middle" font-style="italic">no Kata configured</text>

  <!-- legend -->
  <rect x="760" y="164" width="160" height="52" rx="8" fill="#11182a" stroke="#334155"/>
  <text x="840" y="186" fill="#cbd5e1" font-size="10.5" font-weight="700" text-anchor="middle">highlighted</text>
  <text x="840" y="204" fill="#94a3b8" font-size="9.5" text-anchor="middle">hardened RuntimeClass</text>
</svg>
