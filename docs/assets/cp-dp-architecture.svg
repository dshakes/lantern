<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="Lantern control-plane / data-plane runtime architecture">
  <title>Control-plane / Data-plane architecture</title>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="av" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect width="1240" height="500" rx="16" fill="#0b1120"/>
  <rect width="1240" height="500" rx="16" fill="none" stroke="#1e293b"/>

  <!-- title -->
  <text x="32" y="38" fill="#f8fafc" font-size="20" font-weight="700">Control-plane / Data-plane architecture</text>
  <text x="490" y="38" fill="#94a3b8" font-size="13">budget-gated · identity-minted · audit-linked · receipt-signed</text>

  <!-- ── CONTROL PLANE zone ── -->
  <rect x="20" y="56" width="1200" height="210" rx="10" fill="#080f1c" stroke="#38bdf8" stroke-opacity="0.35"/>
  <text x="36" y="74" fill="#38bdf8" font-size="10.5" font-weight="700" letter-spacing=".14em">CONTROL PLANE · SaaS</text>

  <!-- CP chain nodes -->
  <!-- Auth -->
  <rect x="40" y="86" width="185" height="72" rx="8" fill="#160e26" stroke="#8b5cf6"/>
  <text x="54" y="109" fill="#e2e8f0" font-size="12" font-weight="700">Auth · RBAC scopes</text>
  <text x="54" y="127" fill="#94a3b8" font-size="10">JWT validation</text>
  <text x="54" y="143" fill="#94a3b8" font-size="10">scope enforcement</text>

  <!-- Budget -->
  <rect x="246" y="86" width="185" height="72" rx="8" fill="#0c1a14" stroke="#34d399"/>
  <text x="260" y="109" fill="#e2e8f0" font-size="12" font-weight="700">Quota + Budget gate</text>
  <text x="260" y="127" fill="#94a3b8" font-size="10">pre-run cost forecast</text>
  <text x="260" y="143" fill="#fca5a5" font-size="10" font-weight="700">hard-fail → HTTP 402</text>

  <!-- Identity -->
  <rect x="452" y="86" width="185" height="72" rx="8" fill="#13233b" stroke="#38bdf8"/>
  <text x="466" y="109" fill="#e2e8f0" font-size="12" font-weight="700">Identity issuer</text>
  <text x="466" y="127" fill="#94a3b8" font-size="10">per-instance token</text>
  <text x="466" y="143" fill="#94a3b8" font-size="10">HS256 agent-instance JWT</text>

  <!-- Scheduler dispatch -->
  <rect x="658" y="86" width="185" height="72" rx="8" fill="#241a37" stroke="#f59e0b"/>
  <text x="672" y="109" fill="#e2e8f0" font-size="12" font-weight="700">Scheduler dispatch</text>
  <text x="672" y="127" fill="#94a3b8" font-size="10">placement via gRPC</text>
  <text x="672" y="143" fill="#94a3b8" font-size="10">injects tenant metadata</text>

  <!-- Audit -->
  <rect x="892" y="86" width="192" height="60" rx="8" fill="#11182a" stroke="#475569"/>
  <text x="906" y="108" fill="#e2e8f0" font-size="12" font-weight="700">Audit log</text>
  <text x="906" y="126" fill="#94a3b8" font-size="10">journal_events (Postgres)</text>
  <text x="906" y="140" fill="#94a3b8" font-size="10">event-sourced · immutable</text>

  <!-- Receipt -->
  <rect x="892" y="170" width="192" height="60" rx="8" fill="#0e1626" stroke="#a78bfa"/>
  <text x="906" y="192" fill="#e2e8f0" font-size="12" font-weight="700">Receipt signer</text>
  <text x="906" y="210" fill="#94a3b8" font-size="10">Ed25519 · journal SHA-256</text>
  <text x="906" y="224" fill="#94a3b8" font-size="10">verify offline at /proof</text>

  <!-- CP chain arrows -->
  <line x1="225" y1="122" x2="246" y2="122" stroke="#64748b" marker-end="url(#a)"/>
  <line x1="431" y1="122" x2="452" y2="122" stroke="#64748b" marker-end="url(#a)"/>
  <line x1="637" y1="122" x2="658" y2="122" stroke="#64748b" marker-end="url(#a)"/>

  <!-- D dashed → Audit -->
  <line x1="843" y1="116" x2="892" y2="116" stroke="#64748b" stroke-dasharray="5,4" stroke-opacity="0.7" marker-end="url(#a)"/>

  <!-- Audit → Receipt -->
  <line x1="988" y1="146" x2="988" y2="170" stroke="#64748b" marker-end="url(#a)"/>

  <!-- ── DATA PLANE zone ── -->
  <rect x="20" y="292" width="800" height="172" rx="10" fill="#04100d" stroke="#34d399" stroke-opacity="0.35"/>
  <text x="36" y="310" fill="#34d399" font-size="10.5" font-weight="700" letter-spacing=".14em">DATA PLANE · your VPC / K8s</text>

  <!-- runtime-scheduler -->
  <rect x="40" y="322" width="215" height="78" rx="8" fill="#101a26" stroke="#38bdf8"/>
  <text x="54" y="345" fill="#e2e8f0" font-size="12" font-weight="700">runtime-scheduler</text>
  <text x="54" y="363" fill="#94a3b8" font-size="10">placement engine</text>
  <text x="54" y="377" fill="#94a3b8" font-size="10">Postgres advisory-lock HA</text>

  <!-- runtime-manager -->
  <rect x="278" y="322" width="215" height="78" rx="8" fill="#1a1210" stroke="#f59e0b"/>
  <text x="292" y="345" fill="#e2e8f0" font-size="12" font-weight="700">runtime-manager</text>
  <text x="292" y="363" fill="#94a3b8" font-size="10">RuntimeClass tiering</text>
  <text x="292" y="377" fill="#94a3b8" font-size="10">Firecracker / Kata / gVisor</text>

  <!-- harness -->
  <rect x="516" y="322" width="215" height="78" rx="8" fill="#0a1a12" stroke="#34d399"/>
  <text x="530" y="345" fill="#e2e8f0" font-size="12" font-weight="700">in-VM harness</text>
  <text x="530" y="363" fill="#94a3b8" font-size="10">egress allowlist · SO_PEERCRED</text>
  <text x="530" y="377" fill="#94a3b8" font-size="10">secret vend · heartbeat</text>

  <!-- DP chain arrows -->
  <line x1="255" y1="361" x2="278" y2="361" stroke="#64748b" marker-end="url(#a)"/>
  <line x1="493" y1="361" x2="516" y2="361" stroke="#64748b" marker-end="url(#a)"/>

  <!-- D → S (gRPC · tenant metadata) -->
  <polyline points="750,158 750,240 147,240 147,322" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="448" y="232" fill="#38bdf8" font-size="10" text-anchor="middle" font-weight="600">gRPC · tenant metadata</text>

  <!-- H → CP (mTLS heartbeat · vend) -->
  <polyline points="731,361 1140,361 1140,220" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#av)"/>
  <text x="936" y="353" fill="#a78bfa" font-size="10" font-weight="600">mTLS heartbeat · vend</text>

  <!-- H dashed → Audit -->
  <polyline points="623,322 623,268 988,268 988,146" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3" stroke-opacity="0.65" marker-end="url(#a)"/>
</svg>
