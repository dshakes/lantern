<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="668" viewBox="0 0 1240 668"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="The five loop tiers — nano (event-driven), micro (every 5 min), meso (every 45 min), macro (daily 8am), mega (weekly Mon 9am). Same engine, budget and signed receipt; five clock speeds. Top turns fastest, bottom slowest.">
  <title>The five loop tiers</title>

  <!-- backdrop -->
  <rect width="1240" height="668" rx="16" fill="#0b1120"/>
  <rect width="1240" height="668" rx="16" fill="none" stroke="#1e293b"/>

  <!-- title -->
  <text x="32" y="38" fill="#f8fafc" font-size="20" font-weight="700">The five loop tiers</text>
  <text x="226" y="38" fill="#94a3b8" font-size="13">same engine, budget &amp; signed receipt — five clock speeds. top turns fastest, bottom slowest.</text>

  <!-- speed axis -->
  <text x="30" y="60" fill="#64748b" font-size="11">faster ▲</text>
  <text x="30" y="650" fill="#64748b" font-size="11">slower ▼</text>

  <!-- ═══════════ nano · event-driven (rose) ═══════════ -->
  <rect x="20" y="70" width="1200" height="104" rx="10" fill="#fb7185" fill-opacity="0.06" stroke="#fb7185" stroke-opacity="0.25"/>
  <circle cx="86" cy="122" r="28" fill="#fb7185" fill-opacity="0.10" stroke="#fb7185" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M82 88 L96 94 L82 100 Z" fill="#fb7185"/>
  <text x="140" y="114" fill="#fda4af" font-size="22" font-weight="700">nano</text>
  <text x="140" y="136" fill="#cbd5e1" font-size="13">event-driven</text>
  <text x="140" y="155" fill="#64748b" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">no cron — bridge fires on a signal</text>
  <text x="372" y="126" fill="#64748b" font-size="11">drives</text>
  <g><rect x="440" y="108" width="132" height="28" rx="14" fill="#fb7185" fill-opacity="0.12" stroke="#fb7185" stroke-opacity="0.42"/><text x="506" y="127" text-anchor="middle" font-size="12" font-weight="600" fill="#fda4af">commute-copilot</text></g>
  <g><rect x="582" y="108" width="125" height="28" rx="14" fill="#fb7185" fill-opacity="0.12" stroke="#fb7185" stroke-opacity="0.42"/><text x="644" y="127" text-anchor="middle" font-size="12" font-weight="600" fill="#fda4af">energy-guardian</text></g>
  <g><rect x="717" y="108" width="105" height="28" rx="14" fill="#fb7185" fill-opacity="0.12" stroke="#fb7185" stroke-opacity="0.42"/><text x="769" y="127" text-anchor="middle" font-size="12" font-weight="600" fill="#fda4af">health-coach</text></g>
  <g><rect x="832" y="108" width="118" height="28" rx="14" fill="#fb7185" fill-opacity="0.12" stroke="#fb7185" stroke-opacity="0.42"/><text x="891" y="127" text-anchor="middle" font-size="12" font-weight="600" fill="#fda4af">focus-guardian</text></g>

  <!-- ═══════════ micro · every 5 min (amber) ═══════════ -->
  <rect x="20" y="186" width="1200" height="104" rx="10" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-opacity="0.25"/>
  <circle cx="86" cy="238" r="28" fill="#f59e0b" fill-opacity="0.10" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M82 204 L96 210 L82 216 Z" fill="#f59e0b"/>
  <text x="140" y="230" fill="#fcd34d" font-size="22" font-weight="700">micro</text>
  <text x="140" y="252" fill="#cbd5e1" font-size="13">every 5 minutes</text>
  <text x="140" y="271" fill="#64748b" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">*/5 * * * *</text>
  <text x="372" y="242" fill="#64748b" font-size="11">drives</text>
  <text x="440" y="243" fill="#64748b" font-size="12.5" font-style="italic">available for near-real-time pollers — no default agent seeded</text>

  <!-- ═══════════ meso · every 45 min (sky) ═══════════ -->
  <rect x="20" y="302" width="1200" height="104" rx="10" fill="#38bdf8" fill-opacity="0.06" stroke="#38bdf8" stroke-opacity="0.25"/>
  <circle cx="86" cy="354" r="28" fill="#38bdf8" fill-opacity="0.10" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M82 320 L96 326 L82 332 Z" fill="#38bdf8"/>
  <text x="140" y="346" fill="#7dd3fc" font-size="22" font-weight="700">meso</text>
  <text x="140" y="368" fill="#cbd5e1" font-size="13">every 45 minutes</text>
  <text x="140" y="387" fill="#64748b" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">*/45 * * * *</text>
  <text x="372" y="358" fill="#64748b" font-size="11">drives</text>
  <g><rect x="440" y="340" width="120" height="28" rx="14" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.42"/><text x="500" y="359" text-anchor="middle" font-size="12" font-weight="600" fill="#7dd3fc">inbox-autopilot</text></g>

  <!-- ═══════════ macro · daily 8am (violet) ═══════════ -->
  <rect x="20" y="418" width="1200" height="104" rx="10" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.25"/>
  <circle cx="86" cy="470" r="28" fill="#a78bfa" fill-opacity="0.10" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M82 436 L96 442 L82 448 Z" fill="#a78bfa"/>
  <text x="140" y="462" fill="#c4b5fd" font-size="22" font-weight="700">macro</text>
  <text x="140" y="484" fill="#cbd5e1" font-size="13">daily at 8am</text>
  <text x="140" y="503" fill="#64748b" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">0 8 * * *</text>
  <text x="372" y="474" fill="#64748b" font-size="11">drives</text>
  <g><rect x="440" y="456" width="125" height="28" rx="14" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.42"/><text x="502" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd">chief-of-staff</text></g>
  <g><rect x="575" y="456" width="145" height="28" rx="14" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.42"/><text x="647" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd">financial-sentinel</text></g>
  <g><rect x="730" y="456" width="125" height="28" rx="14" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.42"/><text x="792" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#c4b5fd">domain-tracker</text></g>

  <!-- ═══════════ mega · weekly (emerald) ═══════════ -->
  <rect x="20" y="534" width="1200" height="104" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.25"/>
  <circle cx="86" cy="586" r="28" fill="#34d399" fill-opacity="0.10" stroke="#34d399" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M82 552 L96 558 L82 564 Z" fill="#34d399"/>
  <text x="140" y="578" fill="#6ee7b7" font-size="22" font-weight="700">mega</text>
  <text x="140" y="600" fill="#cbd5e1" font-size="13">weekly</text>
  <text x="140" y="619" fill="#64748b" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">0 9 * * 1 · Mon 9am</text>
  <text x="372" y="590" fill="#64748b" font-size="11">drives</text>
  <g><rect x="440" y="572" width="152" height="28" rx="14" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.42"/><text x="516" y="591" text-anchor="middle" font-size="12" font-weight="600" fill="#6ee7b7">relationship-keeper</text></g>
</svg>
