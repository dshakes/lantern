<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="510" viewBox="0 0 1240 510"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="Security flow: JWT caller → Control Plane → Data Plane, with secret vending, audit, and signed receipt">
  <title>Security sequence — schedule, vend, audit, receipt</title>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#34d399"/>
    </marker>
    <marker id="av" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect width="1240" height="510" rx="16" fill="#0b1120"/>
  <rect width="1240" height="510" rx="16" fill="none" stroke="#1e293b"/>

  <!-- title -->
  <text x="32" y="38" fill="#f8fafc" font-size="20" font-weight="700">Security sequence</text>
  <text x="244" y="38" fill="#94a3b8" font-size="13">schedule → quota gate → identity mint → spawn → secret vend → audit → signed receipt</text>

  <!-- ── Participants ── -->
  <!-- U: Caller (JWT) -->
  <rect x="30" y="55" width="200" height="52" rx="8" fill="#160e26" stroke="#8b5cf6"/>
  <text x="130" y="78" fill="#c4b5fd" font-size="12" font-weight="700" text-anchor="middle">Caller</text>
  <text x="130" y="96" fill="#94a3b8" font-size="10" text-anchor="middle">JWT · RBAC: runtime:write</text>

  <!-- CP: Control Plane -->
  <rect x="480" y="55" width="220" height="52" rx="8" fill="#13233b" stroke="#38bdf8"/>
  <text x="590" y="78" fill="#7dd3fc" font-size="12" font-weight="700" text-anchor="middle">Control Plane</text>
  <text x="590" y="96" fill="#94a3b8" font-size="10" text-anchor="middle">SaaS · :8080 / :50051</text>

  <!-- DP: Data Plane -->
  <rect x="960" y="55" width="240" height="52" rx="8" fill="#0a1a12" stroke="#34d399"/>
  <text x="1080" y="78" fill="#6ee7b7" font-size="12" font-weight="700" text-anchor="middle">Data Plane</text>
  <text x="1080" y="96" fill="#94a3b8" font-size="10" text-anchor="middle">agent instance · in-VM harness</text>

  <!-- Lifelines -->
  <line x1="130" y1="107" x2="130" y2="478" stroke="#27324a" stroke-dasharray="3,5" stroke-width="1.5"/>
  <line x1="590" y1="107" x2="590" y2="478" stroke="#27324a" stroke-dasharray="3,5" stroke-width="1.5"/>
  <line x1="1080" y1="107" x2="1080" y2="478" stroke="#27324a" stroke-dasharray="3,5" stroke-width="1.5"/>

  <!-- Activation bars -->
  <rect x="586" y="148" width="8" height="310" rx="2" fill="#38bdf8" fill-opacity="0.25"/>
  <rect x="1076" y="310" width="8" height="110" rx="2" fill="#34d399" fill-opacity="0.25"/>

  <!-- ── Message 1: U → CP: schedule ── -->
  <line x1="132" y1="152" x2="582" y2="152" stroke="#38bdf8" stroke-width="1.6" marker-end="url(#ab)"/>
  <text x="358" y="143" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">schedule(AgentSpec)</text>
  <text x="358" y="167" fill="#94a3b8" font-size="9.5" text-anchor="middle">RBAC: runtime:write · gRPC with tenant_id in metadata</text>

  <!-- ── Message 2: CP self-loop: quota + budget ── -->
  <path d="M594,195 L648,195 L648,217 L594,217" fill="none" stroke="#34d399" stroke-width="1.4"/>
  <circle cx="594" cy="206" r="3" fill="#34d399" fill-opacity="0.6"/>
  <text x="656" y="202" fill="#6ee7b7" font-size="11" font-weight="600">quota + budget gate</text>
  <text x="656" y="218" fill="#94a3b8" font-size="9.5">pre-run forecast · HTTP 402 if over cap</text>

  <!-- ── Message 3: CP self-loop: mint identity ── -->
  <path d="M594,250 L664,250 L664,272 L594,272" fill="none" stroke="#a78bfa" stroke-width="1.4"/>
  <circle cx="594" cy="261" r="3" fill="#a78bfa" fill-opacity="0.6"/>
  <text x="672" y="257" fill="#c4b5fd" font-size="11" font-weight="600">mint per-instance identity</text>
  <text x="672" y="273" fill="#94a3b8" font-size="9.5">HS256 agent-instance JWT · injected as LANTERN_AGENT_INSTANCE_TOKEN</text>

  <!-- ── Message 4: CP → DP: spawn ── -->
  <line x1="598" y1="312" x2="1072" y2="312" stroke="#34d399" stroke-width="1.6" marker-end="url(#ag)"/>
  <text x="836" y="303" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">spawn(authenticated tenant · injected identity)</text>
  <text x="836" y="327" fill="#94a3b8" font-size="9.5" text-anchor="middle">RuntimeClass tier · pod securityContext · NetworkPolicy deny</text>

  <!-- ── Message 5: DP → CP: vend secret ── -->
  <line x1="1072" y1="362" x2="598" y2="362" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="836" y="353" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">vend secret (mTLS + instance token)</text>
  <text x="836" y="377" fill="#94a3b8" font-size="9.5" text-anchor="middle">SO_PEERCRED peer-auth · short-TTL response</text>

  <!-- ── Message 6: DP -->> CP: audit events (dashed) ── -->
  <line x1="1072" y1="412" x2="598" y2="412" stroke="#64748b" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#a)"/>
  <text x="836" y="403" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">audit events (agent_instance_id)</text>
  <text x="836" y="426" fill="#64748b" font-size="9.5" text-anchor="middle">streamed to journal_events · immutable · never dropped</text>

  <!-- ── Message 7: CP → U: signed receipt ── -->
  <line x1="582" y1="463" x2="138" y2="463" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#av)"/>
  <text x="358" y="454" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Ed25519-signed receipt</text>
  <text x="358" y="478" fill="#94a3b8" font-size="9.5" text-anchor="middle">covers journal SHA-256 · verify offline at /proof (no auth required)</text>
</svg>
