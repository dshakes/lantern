<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="294" viewBox="0 0 1240 294" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Contact-facing agent loops — whatsapp-assistant and imessage-assistant. Both follow the same reactive loop: contact messages, understand, draft in your voice, send to contact, repeat. These reply AS YOU to real contacts; owner-only gate, VIP via dashboard draft queue.">
  <title>Contact-facing agent loops</title>
  <defs><marker id="mr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#fb7185"/></marker></defs>
  <rect width="1240" height="294" rx="16" fill="#0b1120"/>
  <rect width="1240" height="294" rx="16" fill="none" stroke="#1e293b"/>
  <rect x="20" y="16" width="1200" height="36" rx="9" fill="#fb7185" fill-opacity="0.10" stroke="#fb7185" stroke-opacity="0.4"/>
  <text x="38" y="39" fill="#fda4af" font-size="11.5" font-weight="700">⚠ These reply AS YOU to real contacts. Owner-only gate enforced · VIP contacts always route through the dashboard draft queue.</text>
  <rect x="20" y="66" width="1200" height="100" rx="10" fill="#fb7185" fill-opacity="0.07" stroke="#fb7185" stroke-opacity="0.26"/>
  <text x="42" y="84" fill="#fda4af" font-size="12" font-weight="700">whatsapp-assistant</text>
  <text x="204" y="84" fill="#64748b" font-size="10.5">reactive · on every inbound WhatsApp message · replies as you</text>
  <rect x="42" y="96" width="158" height="44" rx="8" fill="#fb7185" fill-opacity="0.13" stroke="#fb7185" stroke-opacity="0.5"/>
  <text x="121" y="122" fill="#fda4af" font-size="11" font-weight="600" text-anchor="middle">Contact messages</text>
  <rect x="222" y="96" width="158" height="44" rx="8" fill="#fb7185" fill-opacity="0.13" stroke="#fb7185" stroke-opacity="0.5"/>
  <text x="301" y="122" fill="#fda4af" font-size="11" font-weight="600" text-anchor="middle">Understand</text>
  <rect x="402" y="96" width="158" height="44" rx="8" fill="#fb7185" fill-opacity="0.13" stroke="#fb7185" stroke-opacity="0.5"/>
  <text x="481" y="122" fill="#fda4af" font-size="11" font-weight="600" text-anchor="middle">Draft in your voice</text>
  <rect x="582" y="96" width="158" height="44" rx="8" fill="#fb7185" fill-opacity="0.13" stroke="#fb7185" stroke-opacity="0.5"/>
