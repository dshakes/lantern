  <line x1="382" y1="118" x2="400" y2="118" stroke="#fb7185" stroke-width="1.5" marker-end="url(#mr)"/>
  <line x1="562" y1="118" x2="580" y2="118" stroke="#fb7185" stroke-width="1.5" marker-end="url(#mr)"/>
  <path d="M 740 118 C 754 158, 28 158, 42 118" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mr)"/>
  <rect x="357" y="141" width="68" height="18" rx="9" fill="#0b1120" stroke="#fb7185" stroke-opacity="0.5"/>
  <text x="391" y="151" fill="#fda4af" font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="middle">↻ repeats</text>
  <rect x="20" y="178" width="1200" height="100" rx="10" fill="#fb7185" fill-opacity="0.07" stroke="#fb7185" stroke-opacity="0.26"/>
  <text x="42" y="196" fill="#fda4af" font-size="12" font-weight="700">imessage-assistant</text>
  <text x="204" y="196" fill="#64748b" font-size="10.5">reactive · on every inbound iMessage · replies as you · RCS/SMS fallback via Twilio</text>
  <rect x="42" y="208" width="158" height="44" rx="8" fill="#fb7185" fill-opacity="0.13" stroke="#fb7185" stroke-opacity="0.5"/>
  <text x="121" y="234" fill="#fda4af" font-size="11" font-weight="600" text-anchor="middle">Contact messages</text>
