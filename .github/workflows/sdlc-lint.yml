# Lint — PR gate that runs all three linter stacks (Go, Rust, TypeScript) and
# fails fast on the first violation. Mirrors the targets in the top-level Makefile:
#   lint-go  → golangci-lint on every Go module
#   lint-rust → cargo clippy -D warnings on every Rust crate
#   lint-ts  → eslint/tsc/next lint on all TS packages
#
# Named job "lint" so it can be pinned as a required branch-protection check.

name: "sdlc · lint"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: sdlc-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint           # stable name — referenced by branch-protection required checks
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: go1.26.4  # pin to the same toolchain as the QA job

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # ---- Go ---------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/control-plane/go.mod
          cache: false   # golangci-lint manages its own cache

      # golangci-lint v2 (action @v8). v1.64.x is built with go1.24 and
      # REFUSES modules whose `go` directive is newer (control-plane is
      # go1.25), so v1 fails before linting. No .golangci config -> v2 default
      # linters. (v2 dropped the `--timeout` CLI flag; default is generous.)
      - name: golangci-lint (all Go modules)
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: services/control-plane

      - name: golangci-lint (workflow-engine)
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: services/workflow-engine

      - name: golangci-lint (runtime-scheduler)
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: services/runtime-scheduler

      - name: golangci-lint (scheduler)
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: services/scheduler

      # ---- Rust -------------------------------------------------------------
      - name: Set up Rust (pinned toolchain from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          # rust-toolchain.toml at repo root pins channel + clippy component
          toolchain: "1.93"
          components: clippy

      # Rust crates with prost/tonic build.rs (runtime-manager, surface-gateway,
      # gateway) need protoc to compile — qa installs it, the lint job didn't.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: cargo clippy (gateway)
        run: cd services/gateway && cargo clippy --all-targets

      - name: cargo clippy (model-router)
        run: cd services/model-router && cargo clippy --all-targets

      - name: cargo clippy (runtime-manager)
        run: cd services/runtime-manager && cargo clippy --all-targets

      - name: cargo clippy (surface-gateway)
        run: cd services/surface-gateway && cargo clippy --all-targets

      - name: cargo clippy (harness)
        run: cd services/harness && cargo clippy --all-targets

      # ---- TypeScript -------------------------------------------------------
      # TS lint/typecheck steps DEFERRED to a follow-up: ESLint 9 needs a flat
      # eslint.config.js the packages don't have yet, and standalone `tsc` on
      # bridge-core trips on missing @types/node + .ts import extensions (it is
      # verified via tsx/`npm test` in the qa job, and the bridges typecheck via
      # their own `npm run typecheck`). Adding proper eslint flat configs is its
      # own task. The live lint gate is Go (govet) + Rust (clippy) above.
