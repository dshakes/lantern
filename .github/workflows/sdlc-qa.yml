# QA — runs the test suite on every PR push and FAILS the check on failure, so it can be
# a required status check (the deterministic half of the merge gate). Auto-detects the
# stack; comments only when tests fail (a green check covers the passing case).
#
# TEMPLATE: the ubuntu runner ships Go, Node, and Python. Add your stack's setup step
# (actions/setup-go, setup-node, setup-python, dtolnay/rust-toolchain, …) before "Run
# test suite" if your tests need a toolchain or services the runner lacks.
name: "sdlc · qa (tests)"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sdlc-qa-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  qa:
    name: qa               # stable check name — referenced by branch-protection required checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lantern
          POSTGRES_PASSWORD: lantern
          POSTGRES_DB: lantern
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lantern -d lantern"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://lantern:lantern@localhost:5432/lantern?sslmode=disable
      GOTOOLCHAIN: go1.26.4   # pin to the toolchain that fixes GO-2026-4599/4600 and all stdlib CVEs through go1.26.4
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # protoc + the well-known-type .proto includes are required by the Rust
      # runtime-manager's build.rs (prost-build). protobuf-compiler alone gives
      # protoc but NOT google/protobuf/{timestamp,duration}.proto, so the build
      # fails with "google/protobuf/timestamp.proto: File not found". libprotobuf-dev
      # ships those includes under /usr/include/google/protobuf.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
      # Apply the control-plane schema so DB-gated Go tests have their tables.
      # Without this the runtime-secrets / RLS / identity tests fail with
      # 'table "runtime_audit_events" not found'. The server normally migrates
      # on boot; cmd/migrate applies the same schema without booting it.
      - name: Apply DB migrations
        run: cd services/control-plane && SEED_DEV=1 go run ./cmd/migrate
      # `make test` -> `test-ts` runs `npx vitest run` in packages/sdk-ts, which needs
      # vitest (a devDependency) installed. Without `npm ci` first, npx tries to fetch
      # vitest on the fly and fails to resolve `vitest/config`, breaking test-ts.
      - name: Install SDK-TS deps (test-ts runs vitest)
        run: cd packages/sdk-ts && npm ci
      # `make test` -> `test-python` runs pytest in packages/sdk-python, but pytest is a
      # dev extra (pyproject [project.optional-dependencies].dev). Without installing the
      # package's dev deps, pytest is absent and test-python fails with "No module named
      # pytest". Install the package with its dev extra so pytest + pytest-asyncio exist.
      - name: Install SDK-Python deps (test-python runs pytest)
        run: cd packages/sdk-python && python3 -m pip install --quiet '.[dev]'
      - name: Run test suite
        id: test
        run: |
          set -uo pipefail
          log="$RUNNER_TEMP/qa.log"; rc=0
          {
            if [ -f Makefile ] && grep -qE '^test:' Makefile; then make test
            elif [ -f go.mod ];        then go test ./...
            elif [ -f Cargo.toml ];    then cargo test
            elif [ -f package.json ];  then npm test --silent
            elif [ -f pyproject.toml ] || [ -d tests ]; then pytest -q
            else echo "no recognized test setup — skipped"; fi
          } >"$log" 2>&1 || rc=$?
          echo "rc=$rc"  >> "$GITHUB_OUTPUT"
          echo "log=$log" >> "$GITHUB_OUTPUT"
          tail -60 "$log"
          exit "$rc"
      - name: Comment on failure
        if: ${{ always() && steps.test.outputs.rc != '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          LOG: ${{ steps.test.outputs.log }}
        run: |
          { printf '### 🧪 QA — ❌ tests failing\n\n```\n'; tail -60 "$LOG" 2>/dev/null; printf '\n```\n'; } \
            | gh pr comment "$PR" --body-file -
